<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header { background-color: #4F46E5; padding: 20px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
    .content { padding: 30px; color: #374151; line-height: 1.6; text-align: center; }
    .otp-box { background-color: #e0e7ff; color: #4F46E5; font-size: 32px; font-weight: bold; letter-spacing: 5px; padding: 15px; border-radius: 8px; display: inline-block; margin: 20px 0; border: 1px dashed #4F46E5; }
    .footer { background-color: #f9fafb; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ReState</h1>
    </div>
    <div class="content">
      <h3>Verify Your Account</h3>
      <p>Hello {{name}},</p>
      <p>Please use the verification code below to complete your sign-up process. This code is valid for 10 minutes.</p>
      
      <div class="otp-box">{{otp}}</div>
      
      <p style="font-size: 14px; color: #6b7280;">If you did not request this code, please ignore this email.</p>
    </div>
    <div class="footer">
      <p>&copy; ReState. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
