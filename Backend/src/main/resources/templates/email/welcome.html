<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header { background-color: #4F46E5; padding: 20px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; letter-spacing: 1px; }
    .content { padding: 30px; color: #374151; line-height: 1.6; }
    .btn { display: inline-block; background-color: #4F46E5; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; margin-top: 20px; }
    .footer { background-color: #f9fafb; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ReState</h1>
    </div>
    <div class="content">
      <h2>Welcome to ReState, {{name}}</h2>
      <p>We are thrilled to have you on board. At ReState, we are committed to helping you find your perfect space.</p>
      <p>Your account has been successfully created. You can now explore all our features.</p>

    </div>
    <div class="footer">
      <p>&copy;ReState. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
