services:

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: restate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restate}
      POSTGRES_USER: ${POSTGRES_USER:-restate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restate_user} -d ${POSTGRES_DB:-restate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis (Rate limiting + Caching)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: restate_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Spring Boot Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restate_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-restate}?user=${POSTGRES_USER:-restate_user}&password=${POSTGRES_PASSWORD}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # JWT
      SECRET_KEY: ${SECRET_KEY}

      # Mail
      EMAIL: ${EMAIL}
      EMAIL_PASS: ${EMAIL_PASS}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL}

      # Cloudinary
      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_KEY: ${CLOUD_KEY}
      CLOUD_SECRET: ${CLOUD_SECRET}

      # Firebase
      FIREBASE_CONFIG_JSON: ${FIREBASE_CONFIG_JSON}
      VAPID-KEY: ${VAPID_KEY}

      # JVM tuning (optional, adjust to your server RAM)
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  app_logs:
